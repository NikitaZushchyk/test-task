services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ueex_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ueex_network

  nginx:
    image: nginx:1.25-alpine
    container_name: ueex_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ueex_network

  db:
    image: postgres:16-alpine
    container_name: ueex_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ueex}
      POSTGRES_USER: ${DB_USERNAME:-ueex}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ueex}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ueex_network

networks:
  ueex_network:
    driver: bridge

volumes:
  pgdata:
